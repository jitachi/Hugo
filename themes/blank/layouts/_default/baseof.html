<!doctype html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {{ if .IsHome }}
        👋 •
      {{ else }}
        {{ if .Page.Title }}{{ .Page.Title }} •{{ end }}
      {{ end }}
      {{ .Site.Title }}
    </title>

    {{ with .Site.Params.description }}
      <meta name="description" content="{{ . }}" />
    {{ end }}
    {{ with .Site.Params.author }}
      <meta name="author" content="{{ . }}" />
    {{ end }}


    <script>
      (function () {
        let theme = localStorage.getItem("theme") || "auto";
        let systemDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (theme === "dark" || (theme === "auto" && systemDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.add("light");
        }
      })();
    </script>

    <link rel="stylesheet" href="{{ "css/variables.css" | relURL }}" />
    <link rel="stylesheet" href="{{ "css/type.css" | relURL }}" />
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
    <link rel="stylesheet" href="{{ "css/tailwind.css" | relURL }}" />

    <link rel="shortcut icon" type="image/png" href="/favicon.svg" />
    <link rel="shortcut icon" sizes="192x192" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div class="sticky top-0 left-0 z-50 px-[4vw] py-[2vw]">
      {{ partial "header.html" . }}
    </div>

    <div id="page-content">
      {{ block "main" . }}{{ end }}
    </div>

    <script>
      // SPA-like navigation with sliding animations
      (function () {
        const indicator = document.querySelector(".nav-indicator");
        const navItems = document.querySelectorAll("[data-nav-item]");
        const pageContent = document.querySelector("#page-content");

        // Cache for fetched pages (stores both HTML and DOM elements)
        const pageCache = new Map();
        const domCache = new Map();

        // Store state in sessionStorage
        const STORAGE_KEY = "nav-indicator-position";
        const siteBasePath = new URL(
          "{{ "/" | relURL }}",
          window.location.origin,
        ).pathname;

        function getNavigationPath(url) {
          const parsedUrl = new URL(url, window.location.origin);
          if (parsedUrl.origin !== window.location.origin) {
            return null;
          }

          return parsedUrl.pathname + parsedUrl.search + parsedUrl.hash;
        }

        function isHomePath(pathname = window.location.pathname) {
          const normalizedBasePath = siteBasePath.replace(/\/$/, "") || "/";
          return (
            pathname === "/" ||
            pathname === "" ||
            pathname === siteBasePath ||
            pathname === normalizedBasePath
          );
        }

        function savePosition(left, top, width, height) {
          sessionStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({ left, top, width, height }),
          );
        }

        function getSavedPosition() {
          const saved = sessionStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : null;
        }

        function moveIndicatorTo(targetItem, immediate = false) {
          if (!targetItem || !indicator) return;

          const rect = targetItem.getBoundingClientRect();
          const container = targetItem.closest(".glass-container");
          const containerRect = container.getBoundingClientRect();

          const left = rect.left - containerRect.left;
          const top = rect.top - containerRect.top;

          savePosition(left, top, rect.width, rect.height);

          if (immediate) {
            indicator.style.transition = "none";
            indicator.style.width = rect.width + "px";
            indicator.style.height = rect.height + "px";
            indicator.style.left = left + "px";
            indicator.style.top = top + "px";
            indicator.style.opacity = "1";
            indicator.offsetHeight;
            indicator.style.transition = "";
          } else {
            indicator.style.width = rect.width + "px";
            indicator.style.height = rect.height + "px";
            indicator.style.left = left + "px";
            indicator.style.top = top + "px";
            indicator.style.opacity = "1";
          }
        }

        function initializeIndicator() {
          let activeItem = document.querySelector(".active");

          if (!activeItem) {
            if (isHomePath()) {
              activeItem = document.querySelector(".logo");
            }
          }

          if (activeItem) {
            const savedPosition = getSavedPosition();

            if (savedPosition) {
              indicator.style.transition = "none";
              indicator.style.width = savedPosition.width + "px";
              indicator.style.height = savedPosition.height + "px";
              indicator.style.left = savedPosition.left + "px";
              indicator.style.top = savedPosition.top + "px";
              indicator.style.opacity = "1";
              indicator.offsetHeight;
              indicator.style.transition = "";
            } else {
              moveIndicatorTo(activeItem, true);
            }
          }
        }

        // Fetch and cache page content
        async function fetchPage(url) {
          const navigationPath = getNavigationPath(url);
          if (!navigationPath) {
            return null;
          }

          if (pageCache.has(navigationPath)) {
            console.log("Using cached page:", navigationPath);
            return pageCache.get(navigationPath);
          }

          try {
            console.log("Fetching page:", navigationPath);
            const response = await fetch(navigationPath);
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            const newContent = doc.querySelector("#page-content");
            const title = doc.querySelector("title")?.textContent || "";

            console.log("Fetched content:", newContent ? "found" : "not found");

            const pageData = {
              content: newContent ? newContent.innerHTML : "",
              title: title,
            };

            pageCache.set(navigationPath, pageData);
            return pageData;
          } catch (error) {
            console.error("Failed to fetch page:", error);
            return null;
          }
        }

        // Ensure relative resource URLs resolve against the target page
        function rebaseRelativeUrls(container, baseHref) {
          if (!container || !baseHref) return;

          let baseUrl;
          try {
            baseUrl = new URL(baseHref, window.location.origin);
          } catch (error) {
            console.warn("Invalid base URL for rebasing:", baseHref);
            return;
          }

          const needsRewrite = (value) =>
            value &&
            !value.startsWith("http://") &&
            !value.startsWith("https://") &&
            !value.startsWith("//") &&
            !value.startsWith("/") &&
            !value.startsWith("data:") &&
            !value.startsWith("blob:") &&
            !value.startsWith("#");

          container.querySelectorAll("[src]").forEach((el) => {
            const src = el.getAttribute("src");
            if (needsRewrite(src)) {
              el.src = new URL(src, baseUrl).href;
            }
          });

          container.querySelectorAll("[href]").forEach((el) => {
            const href = el.getAttribute("href");
            if (needsRewrite(href)) {
              el.href = new URL(href, baseUrl).href;
            }
          });
        }

        // Calculate slide direction based on navigation positions
        function getSlideDirection(fromItem, toItem) {
          if (!fromItem || !toItem) return "left";

          const fromRect = fromItem.getBoundingClientRect();
          const toRect = toItem.getBoundingClientRect();

          // If moving right in nav, slide content left (and vice versa)
          return toRect.left > fromRect.left ? "left" : "right";
        }

        // Navigate to new page with slide animation
        async function navigateToPage(url, link) {
          if (!pageContent) {
            console.error("Page content container not found");
            return;
          }

          const navigationPath = getNavigationPath(url);
          if (!navigationPath) {
            window.location.href = url;
            return;
          }

          console.log("Navigating to:", navigationPath);

          // Save current page to DOM cache before leaving
          const currentPath =
            window.location.pathname + window.location.search + window.location.hash;
          if (!domCache.has(currentPath)) {
            const currentContent = pageContent.cloneNode(true);
            domCache.set(currentPath, currentContent);
            console.log("Cached current page:", currentPath);
          }

          // Determine current active item
          const currentActive =
            document.querySelector(".active") ||
            (isHomePath() ? document.querySelector(".logo") : null);

          const direction = getSlideDirection(currentActive, link);
          console.log("Slide direction:", direction);

          // Fetch new content
          const pageData = await fetchPage(navigationPath);
          if (!pageData || !pageData.content) {
            console.log("No page data, falling back to regular navigation");
            // Fallback to regular navigation
            window.location.href = url;
            return;
          }

          // Slide out current content
          pageContent.style.transition =
            "transform 0.125s ease-out, opacity 0.125s ease";
          pageContent.style.transform =
            direction === "left" ? "translateX(-24px)" : "translateX(24px)";
          pageContent.style.opacity = "0";

          // Wait for slide out
          setTimeout(() => {
            // Check if we have cached DOM for this URL
            const cachedDom = domCache.get(navigationPath);
            if (cachedDom) {
              console.log("Using cached DOM for:", navigationPath);
              // Replace entire content with cached DOM
              pageContent.innerHTML = "";
              const newContent = cachedDom.cloneNode(true);
              Array.from(newContent.childNodes).forEach((node) => {
                pageContent.appendChild(node);
              });
            } else {
              // Use fetched HTML
              pageContent.innerHTML = pageData.content;
            }

            // Fix relative URLs so assets load correctly
            rebaseRelativeUrls(pageContent, navigationPath);

            document.title = pageData.title;

            console.log("Content updated");

            // Update active states
            document.querySelectorAll("[data-nav-item]").forEach((item) => {
              item.classList.remove("active");
            });
            link.classList.add("active");

            // Position content for slide in (from opposite direction)
            pageContent.style.transition = "none";
            pageContent.style.transform =
              direction === "left" ? "translateX(24px)" : "translateX(-24px)";
            pageContent.style.opacity = "0";

            // Force reflow
            pageContent.offsetHeight;

            // Slide in new content
            pageContent.style.transition =
              "transform 0.125s ease-out, opacity 0.125s ease";
            pageContent.style.transform = "translateX(0)";
            pageContent.style.opacity = "1";

            // Update URL
            history.pushState({ url: navigationPath }, "", navigationPath);

            // Scroll to top
            window.scrollTo(0, 0);
          }, 125);
        }

        // Handle browser back/forward
        window.addEventListener("popstate", function (e) {
          if (e.state && e.state.url) {
            const link = document.querySelector(`[href="${e.state.url}"]`);
            if (link) {
              navigateToPage(e.state.url, link);
              moveIndicatorTo(link, false);
            } else {
              window.location.href = e.state.url;
            }
          }
        });

        // Initialize on load
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initializeIndicator);
        } else {
          initializeIndicator();
        }

        // Update on resize
        window.addEventListener("resize", function () {
          const activeItem =
            document.querySelector(".active") ||
            (isHomePath() ? document.querySelector(".logo") : null);
          if (activeItem) {
            moveIndicatorTo(activeItem, false);
          }
        });

        // Preload pages on hover
        document.addEventListener("mouseover", function (e) {
          const link = e.target.closest("[data-nav-item]");
          if (link && link.href) {
            const navigationPath = getNavigationPath(link.href);
            if (navigationPath) {
              fetchPage(navigationPath);
            }
          }
        });

        // Intercept navigation clicks
        document.addEventListener("click", function (e) {
          const link = e.target.closest("[data-nav-item]");
          if (link && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
            const navigationPath = getNavigationPath(link.href);
            if (!navigationPath) {
              return;
            }

            e.preventDefault();

            // Don't navigate if clicking the active item
            if (link.classList.contains("active")) {
              return;
            }

            // Check if clicking logo on homepage
            if (link.classList.contains("logo")) {
              if (isHomePath()) {
                return;
              }
            }

            // Move indicator
            moveIndicatorTo(link, false);

            // Navigate with slide animation
            navigateToPage(navigationPath, link);
          }
        });
      })();
    </script>
  </body>
</html>
